name: Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: "npm"
            - name: Install dependencies
              run: npm ci
            - name: Build
              run: npm run build
            - name: Create zip
              run: |
                  mkdir -p release
                  zip -r release/obsidian-beautiful-mermaid.zip manifest.json main.js styles.css versions.json
            - name: Release
              uses: softprops/action-gh-release@v2
              with:
                  files: release/obsidian-beautiful-mermaid.zip
                  generate_release_notes: true
